name: stockbook
description: የሸቀጥ አስተዳደር መተግበሪያ - Grocery stock management app.
publish_to: 'none'
version: 3.0.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # ── Firebase ─────────────────────────────────────
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0        # Authentication (login/signup/reset)
  cloud_firestore: ^5.1.0      # Database (per-user scoped data)
  # ── State & UI ───────────────────────────────────
  provider: ^6.1.1
  table_calendar: ^3.1.2
  intl: any
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  lottie: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/lotties/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon.png"